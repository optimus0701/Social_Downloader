name: Build and Push Docker Image

# Workflow này sẽ chạy mỗi khi có code mới được push lên nhánh "main"
on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code từ repository của bạn xuống môi trường chạy (runner)
      - name: Check out the repo
        uses: actions/checkout@v4

      # 2. Cài đặt Docker Buildx (công cụ hỗ trợ build image nâng cao của Docker)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Đăng nhập vào Docker Hub sử dụng Secrets đã cấu hình
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build và Push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Đường dẫn chứa Dockerfile (ở đây là thư mục gốc)
          push: true
          # Thay 'my-app' bằng tên ứng dụng/image bạn muốn đặt trên Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/my-app:latest
